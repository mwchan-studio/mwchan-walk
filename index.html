<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>dachshund run</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  height:-webkit-fill-available;
  background:#fdfbf7;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
}
#c{display:block;touch-action:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');

const BW = 480, BH = 280;
const GROUND = 210, DOG_X = 90;
let scale = 1;
let rotated = false;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  rotated = (vw < vh) && (vw < 600);

  if (rotated) {
    // 縦持ち：論理横長をCSSで-90度回転して縦長に見せる
    scale = Math.min(vw / BH, vh / BW);
    const cw = Math.floor(BW * scale);
    const ch = Math.floor(BH * scale);
    cv.width = cw; cv.height = ch;
    cv.style.width  = cw + 'px';
    cv.style.height = ch + 'px';
    cv.style.transform = 'rotate(-90deg)';
    cv.style.transformOrigin = 'center center';
    // 回転後の見かけのサイズ（BH*scale × BW*scale）に合わせてmarginで位置補正
    const dispW = Math.floor(BH * scale);
    const dispH = Math.floor(BW * scale);
    cv.style.marginLeft = ((dispW - cw) / 2) + 'px';
    cv.style.marginTop  = ((dispH - ch) / 2) + 'px';
  } else {
    scale = Math.min(vw / BW, vh / BH);
    const cw = Math.floor(BW * scale);
    const ch = Math.floor(BH * scale);
    cv.width = cw; cv.height = ch;
    cv.style.width  = cw + 'px';
    cv.style.height = ch + 'px';
    cv.style.transform = 'none';
    cv.style.marginLeft = '0';
    cv.style.marginTop  = '0';
  }
}

resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));

// ── ゲーム状態 ──────────────────────────────────────
let state = 'idle', score = 0, best = 0, frame = 0, af = 0;
let dog = {y: GROUND, vy: 0, grnd: true, lp: 0};
let items = [], ptcls = [];
let clouds = [{x:400,y:38,s:1},{x:220,y:22,s:0.75},{x:80,y:52,s:0.85}];
let trees  = [{x:430,y:GROUND},{x:310,y:GROUND},{x:190,y:GROUND},{x:70,y:GROUND}];

const G=0.55, JV=-12, SPD0=2.5;
function spd(){ return SPD0 + score * 0.012; }

function spawn(){
  const last = items.length ? items[items.length-1].x : -999;
  if(last > BW-150) return;
  items.push(Math.random() < 0.55
    ? {t:'flower', x:BW+20, y:GROUND-8, done:false}
    : {t:'puddle', x:BW+20, y:GROUND+8});
}

function burst(x,y,col){
  for(let i=0;i<8;i++)
    ptcls.push({x,y,vx:(Math.random()-.5)*4,vy:-(Math.random()*4+1),life:1,col});
}

function hit(it){
  const dx=it.x-DOG_X, dy=it.y-8-dog.y;
  return it.t==='flower' ? Math.abs(dx)<22 && Math.abs(dy)<22
                         : Math.abs(dx)<20 && dog.y>=GROUND-4;
}

// ── 描画 ────────────────────────────────────────────
function S(lw,col){
  cx.lineWidth=lw*scale; cx.strokeStyle=col||'#111';
  cx.lineCap='round'; cx.lineJoin='round';
}

function drawDog(x,y,lp,air){
  cx.save(); cx.translate(x*scale, y*scale);
  const w=air?0:Math.sin(lp), w2=air?0:Math.sin(lp+Math.PI);

  S(2.5,'#1a1a1a');
  [[-14,w2*5],[-5,w*5],[10,w2*4],[20,w*4]].forEach(([lx,off])=>{
    cx.beginPath(); cx.moveTo(lx*scale,-2*scale);
    cx.lineTo((lx+off)*scale,13*scale); cx.lineTo((lx+off+5)*scale,13*scale); cx.stroke();
  });

  cx.fillStyle='#fff'; S(2.5,'#1a1a1a');
  cx.beginPath();
  cx.moveTo(-26*scale,-10*scale);
  cx.bezierCurveTo(-26*scale,-20*scale, 8*scale,-28*scale, 26*scale,-22*scale);
  cx.bezierCurveTo(38*scale,-18*scale, 40*scale,-12*scale, 40*scale,-5*scale);
  cx.bezierCurveTo(40*scale,3*scale, 8*scale,5*scale, -10*scale,2*scale);
  cx.bezierCurveTo(-20*scale,1*scale, -26*scale,-4*scale, -26*scale,-10*scale);
  cx.fill(); cx.stroke();

  const tw=Math.sin(lp*2.5)*5;
  S(2.5,'#1a1a1a');
  cx.beginPath(); cx.moveTo(40*scale,-9*scale);
  cx.bezierCurveTo(50*scale,(-15+tw)*scale, 52*scale,(-8+tw)*scale, 48*scale,(-3+tw)*scale);
  cx.stroke();

  cx.fillStyle='#fff'; S(2.5,'#1a1a1a');
  cx.beginPath(); cx.arc(-22*scale,-21*scale,13*scale,0,Math.PI*2); cx.fill(); cx.stroke();

  cx.fillStyle='#fff';
  cx.beginPath();
  cx.moveTo(-18*scale,-30*scale);
  cx.bezierCurveTo(-12*scale,-30*scale,-10*scale,-16*scale,-15*scale,-12*scale);
  cx.bezierCurveTo(-21*scale,-12*scale,-27*scale,-18*scale,-25*scale,-28*scale);
  cx.closePath(); cx.fill(); cx.stroke();

  cx.fillStyle='#fff'; S(2.5,'#1a1a1a');
  cx.beginPath(); cx.ellipse(-32*scale,-18*scale,6*scale,5*scale,-0.2,0,Math.PI*2);
  cx.fill(); cx.stroke();

  cx.fillStyle='#111';
  cx.beginPath(); cx.arc(-36*scale,-20*scale,2.2*scale,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(-25*scale,-24*scale,2*scale,0,Math.PI*2); cx.fill();
  cx.fillStyle='white';
  cx.beginPath(); cx.arc(-24.3*scale,-24.8*scale,0.7*scale,0,Math.PI*2); cx.fill();

  cx.restore();
}

function drawFlower(x,y,t){
  cx.save(); cx.translate(x*scale,y*scale);
  cx.translate(0,Math.sin(t*0.07)*2*scale);
  S(1.8,'#5a9e50');
  cx.beginPath(); cx.moveTo(0,0);
  cx.bezierCurveTo(2*scale,-8*scale,0,-14*scale,0,-20*scale); cx.stroke();
  const cols=['#ff9eb5','#ffcc88','#b5d9ff','#c8b5ff'];
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2;
    cx.fillStyle=cols[i%4]; S(1.2,'#111');
    cx.beginPath(); cx.arc(Math.cos(a)*5*scale,-20*scale+Math.sin(a)*5*scale,4*scale,0,Math.PI*2);
    cx.fill(); cx.stroke();
  }
  cx.fillStyle='#ffe566'; S(1.5,'#111');
  cx.beginPath(); cx.arc(0,-20*scale,3.5*scale,0,Math.PI*2); cx.fill(); cx.stroke();
  cx.fillStyle='#111';
  cx.beginPath(); cx.arc(-1*scale,-20*scale,.8*scale,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(1*scale,-19.5*scale,.8*scale,0,Math.PI*2); cx.fill();
  cx.restore();
}

function drawPuddle(x,y){
  cx.save(); cx.translate(x*scale,y*scale);
  S(2,'#111'); cx.fillStyle='rgba(120,180,240,0.5)';
  cx.beginPath(); cx.ellipse(0,0,24*scale,8*scale,0,0,Math.PI*2); cx.fill(); cx.stroke();
  S(1.5,'rgba(255,255,255,0.7)');
  cx.beginPath(); cx.ellipse(-7*scale,-2*scale,8*scale,3*scale,-0.2,0,Math.PI*2); cx.stroke();
  cx.restore();
}

function drawCloud(x,y,s){
  cx.save(); cx.translate(x*scale,y*scale);
  cx.fillStyle='rgba(255,255,255,0.85)'; cx.strokeStyle='#d8d4ce'; cx.lineWidth=1.2*scale;
  [[-18,0,14],[-5,-9,16],[10,-5,13],[24,2,11]].forEach(([cx2,cy2,r])=>{
    cx.beginPath(); cx.arc(cx2*s*scale,cy2*s*scale,r*s*scale,0,Math.PI*2);
    cx.fill(); cx.stroke();
  });
  cx.restore();
}

function drawTree(x,y){
  cx.save(); cx.translate(x*scale,y*scale);
  S(2,'#b8a890');
  cx.beginPath(); cx.moveTo(0,0); cx.lineTo(0,-28*scale); cx.stroke();
  cx.fillStyle='rgba(180,210,160,0.45)'; cx.strokeStyle='#9ab890'; cx.lineWidth=1.5*scale;
  cx.beginPath(); cx.arc(0,-34*scale,13*scale,0,Math.PI*2); cx.fill(); cx.stroke();
  cx.restore();
}

function drawGround(){
  S(2.5,'#1a1a1a');
  cx.beginPath(); cx.moveTo(0,GROUND*scale); cx.lineTo(BW*scale,GROUND*scale); cx.stroke();
  cx.strokeStyle='#d8d0c4'; cx.lineWidth=scale;
  for(let i=0;i<14;i++){
    const gx=((af*spd()*.5)+i*38)%BW;
    cx.beginPath(); cx.moveTo(gx*scale,GROUND*scale); cx.lineTo((gx+18)*scale,GROUND*scale); cx.stroke();
  }
}

function drawScore(){
  cx.font=`${12*scale}px Georgia,serif`; cx.fillStyle='#aaa'; cx.textAlign='left';
  cx.fillText('score',18*scale,26*scale);
  cx.font=`bold ${20*scale}px Georgia,serif`; cx.fillStyle='#333';
  cx.fillText(score,18*scale,48*scale);
  if(best>0){
    cx.font=`${11*scale}px Georgia,serif`; cx.fillStyle='#ccc'; cx.textAlign='right';
    cx.fillText('best  '+best,(BW-18)*scale,26*scale);
  }
}

function rrect(x,y,w,h,r){
  cx.beginPath(); cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r); cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r); cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
}

function drawStart(){
  cx.font=`${17*scale}px Georgia,serif`; cx.fillStyle='#666'; cx.textAlign='center';
  cx.fillText('tap  ·  space', BW/2*scale, 88*scale);
  cx.font=`${11*scale}px Georgia,serif`; cx.fillStyle='#bbb';
  cx.fillText('collect flowers · avoid puddles', BW/2*scale, 108*scale);
}

function drawOver(){
  cx.fillStyle='rgba(255,255,255,0.9)';
  rrect((BW/2-105)*scale,68*scale,210*scale,72*scale,10*scale); cx.fill();
  cx.strokeStyle='#e0e0e0'; cx.lineWidth=scale;
  rrect((BW/2-105)*scale,68*scale,210*scale,72*scale,10*scale); cx.stroke();
  cx.font=`bold ${15*scale}px Georgia,serif`; cx.fillStyle='#444'; cx.textAlign='center';
  cx.fillText('splashed  ·  '+score, BW/2*scale, 98*scale);
  cx.font=`${11*scale}px Georgia,serif`; cx.fillStyle='#aaa';
  cx.fillText('tap to try again', BW/2*scale, 124*scale);
}

function jump(){
  if(state==='idle'||state==='over'){ reset(); return; }
  if(dog.grnd && state==='play'){ dog.vy=JV; dog.grnd=false; }
}

function reset(){
  state='play'; score=0; frame=0; af=0;
  dog={y:GROUND,vy:0,grnd:true,lp:0};
  items=[]; ptcls=[];
}

let spawnT=0;

(function loop(){
  requestAnimationFrame(loop);
  af++;
  cx.clearRect(0,0,cv.width,cv.height);
  cx.fillStyle='#fdfcf9'; cx.fillRect(0,0,cv.width,cv.height);

  for(const cl of clouds){
    cl.x -= state==='play' ? .28 : .14;
    if(cl.x<-80) cl.x=BW+80;
    drawCloud(cl.x,cl.y,cl.s);
  }
  for(const t of trees){
    t.x -= state==='play' ? spd()*.4 : 0;
    if(t.x<-30) t.x=BW+30;
    drawTree(t.x,t.y);
  }
  drawGround();

  if(state==='play'){
    frame++;
    dog.vy+=G; dog.y+=dog.vy;
    if(dog.y>=GROUND){ dog.y=GROUND; dog.vy=0; dog.grnd=true; }
    if(dog.grnd) dog.lp+=0.2;
    spawnT++;
    if(spawnT>80+Math.random()*40){ spawn(); spawnT=0; }
    for(let i=items.length-1;i>=0;i--){
      const it=items[i]; it.x-=spd();
      if(it.t==='flower'){
        drawFlower(it.x,it.y,af);
        if(hit(it)){ score++; burst(DOG_X*scale,dog.y*scale,'#ffddaa'); items.splice(i,1); }
      } else {
        drawPuddle(it.x,it.y);
        if(hit(it)){ burst(DOG_X*scale,dog.y*scale,'#90c8ee'); if(score>best)best=score; state='over'; }
      }
      if(it.x<-70) items.splice(i,1);
    }
    drawDog(DOG_X,dog.y,dog.lp,!dog.grnd);
    drawScore();
  } else if(state==='idle'){
    const bob=Math.sin(af*.035)*2;
    drawFlower(DOG_X-45,GROUND-2,af);
    drawFlower(DOG_X-25,GROUND-2,af+20);
    drawDog(DOG_X,GROUND+bob,af*.12,false);
    drawStart();
  } else {
    drawPuddle(DOG_X+12,GROUND+8);
    drawDog(DOG_X,GROUND,0,false);
    drawScore(); drawOver();
  }

  for(let i=ptcls.length-1;i>=0;i--){
    const p=ptcls[i];
    p.x+=p.vx*scale; p.y+=p.vy*scale; p.vy+=.18*scale; p.life-=.04;
    if(p.life<=0){ ptcls.splice(i,1); continue; }
    cx.save(); cx.globalAlpha=p.life;
    cx.fillStyle=p.col; S(1.2,'#111');
    cx.beginPath(); cx.arc(p.x,p.y,3*scale,0,Math.PI*2); cx.fill(); cx.stroke();
    cx.restore();
  }
})();

cv.addEventListener('pointerdown', e=>{ e.preventDefault(); jump(); });
document.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); jump(); } });
</script>
</body>
</html>
