<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>dachshund run</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #fdfbf7;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px)
             env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
  }
  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ─────────────────────────────────────────────
// スマホ縦向き専用レイアウト
//
// PCは「横長 480×280」のまま描画。
// スマホ縦画面では「縦長 280×480」の
// 独自レイアウトで描画（回転なし・変形なし）。
// ─────────────────────────────────────────────

let isMobile = false;   // スマホ判定
let scale    = 1;

// ── 論理サイズ（環境によって切り替え）──
let BW, BH, GROUND, DOG_X, ITEM_SPAWN_X;

function applyLayout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // 幅500px未満 → スマホ縦向きレイアウト
  isMobile = vw < 500;

  if (isMobile) {
    // 縦長ゲームフィールド
    BW = 300; BH = 500;
    GROUND = 390;
    DOG_X  = 70;
    ITEM_SPAWN_X = BW + 20;
    scale = Math.min(vw / BW, vh / BH);
  } else {
    // 横長ゲームフィールド（PC）
    BW = 480; BH = 280;
    GROUND = 205;
    DOG_X  = 90;
    ITEM_SPAWN_X = BW + 20;
    scale = Math.min(vw / BW, vh / BH);
  }

  const cw = Math.floor(BW * scale);
  const ch = Math.floor(BH * scale);
  canvas.width  = cw;
  canvas.height = ch;
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  // 回転・変形は一切しない
  canvas.style.transform = 'none';
}

applyLayout();
window.addEventListener('resize', () => { applyLayout(); });
window.addEventListener('orientationchange', () => { setTimeout(applyLayout, 250); });

// ─────────────────────────────────────────────
// ゲーム変数
// ─────────────────────────────────────────────
let gameState = 'idle';
let score = 0, hiScore = 0, frame = 0, animFrame = 0;
let dog = { y: 0, vy: 0, onGround: true, legPhase: 0 };
let items = [], particles = [];
let clouds  = [];
let bgTrees = [];

function initObjects() {
  dog = { y: GROUND, vy: 0, onGround: true, legPhase: 0 };
  clouds  = [
    { x: BW*0.82, y: BH*0.10, s: 1.0 },
    { x: BW*0.45, y: BH*0.07, s: 0.75 },
    { x: BW*0.15, y: BH*0.13, s: 0.85 },
  ];
  bgTrees = [
    { x: BW*0.88, y: GROUND },
    { x: BW*0.63, y: GROUND },
    { x: BW*0.38, y: GROUND },
    { x: BW*0.13, y: GROUND },
  ];
}
initObjects();

const GRAVITY = 0.55, JUMP_V = -12, SPEED_BASE = 2.5;
function getSpeed() { return SPEED_BASE + score * 0.012; }

function spawnItem() {
  const minGap = (isMobile ? 100 : 160) + Math.random() * 100;
  const lastX  = items.length ? items[items.length - 1].x : 0;
  if (lastX > BW - minGap) return;
  if (Math.random() < 0.55) {
    items.push({ type: 'flower', x: ITEM_SPAWN_X, y: GROUND - 8, collected: false });
  } else {
    items.push({ type: 'puddle', x: ITEM_SPAWN_X, y: GROUND + 8 });
  }
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++)
    particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: -(Math.random()*4+1), life: 1, color });
}

// ─────────────────────────────────────────────
// 描画関数（論理座標で記述、scale を掛ける）
// スマホではキャラを 1.5 倍に拡大
// ─────────────────────────────────────────────
function dogScale() { return isMobile ? 1.45 : 1.0; }

function drawDog(x, y, phase, jumping) {
  const ds = dogScale();
  ctx.save();
  ctx.translate(x * scale, y * scale);
  ctx.scale(ds, ds);

  ctx.strokeStyle = '#1a1a1a';
  ctx.fillStyle   = '#f5e6c8';
  ctx.lineWidth   = 2.5 * scale;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const lp  = jumping ? 0 : Math.sin(phase) * 4;
  const lp2 = jumping ? 0 : Math.sin(phase + Math.PI) * 4;

  // body
  ctx.beginPath(); ctx.ellipse(0,-10,22,10,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // head
  ctx.beginPath(); ctx.ellipse(22,-18,11,9,0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // snout
  ctx.beginPath(); ctx.ellipse(31,-16,7,5,0.1,0,Math.PI*2);
  ctx.fillStyle='#e8d4a0'; ctx.fill(); ctx.stroke();
  // nose
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(36,-17,2.5,2,0,0,Math.PI*2); ctx.fill();
  // eye
  ctx.beginPath(); ctx.arc(26,-21,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(27,-22,0.7,0,Math.PI*2); ctx.fill();
  // ear
  ctx.fillStyle='#c8a46e'; ctx.strokeStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(20,-13,5,9,0.7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // tail
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5*scale;
  const tw=Math.sin(phase*3)*6;
  ctx.beginPath(); ctx.moveTo(-20,-14);
  ctx.quadraticCurveTo(-28,-22+tw,-26,-30+tw); ctx.stroke();
  // legs
  ctx.lineWidth=3*scale; ctx.strokeStyle='#1a1a1a';
  function leg(lx,ly,off){
    ctx.beginPath(); ctx.moveTo(lx,ly);
    ctx.lineTo(lx,ly+12+off); ctx.lineTo(lx+5,ly+12+off); ctx.stroke();
  }
  leg(-8,-2,lp); leg(2,-2,lp2); leg(10,-2,lp); leg(18,-2,lp2);
  ctx.restore();
}

function drawFlower(x, y, anim) {
  ctx.save();
  ctx.translate(x*scale, y*scale);
  ctx.translate(0, Math.sin(anim*0.08)*2*scale);
  ctx.lineCap='round';
  ctx.strokeStyle='#5a9e50'; ctx.lineWidth=1.8*scale;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.quadraticCurveTo(3*scale,-10*scale,0,-18*scale); ctx.stroke();
  const pColors=['#ff9eb5','#ffcc88','#b5d9ff','#c8b5ff'];
  for (let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2;
    ctx.fillStyle=pColors[i%4]; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.2*scale;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*5*scale,-18*scale+Math.sin(a)*5*scale,4*scale,3*scale,a,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle='#ffe566'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5*scale;
  ctx.beginPath(); ctx.arc(0,-18*scale,4*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPuddle(x, y) {
  ctx.save(); ctx.translate(x*scale,y*scale);
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.8*scale;
  ctx.fillStyle='rgba(120,180,240,0.6)';
  ctx.beginPath(); ctx.ellipse(0,0,22*scale,8*scale,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(180,220,255,0.7)';
  ctx.beginPath(); ctx.ellipse(-6*scale,-2*scale,7*scale,3*scale,-0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCloud(x, y, s) {
  ctx.save(); ctx.translate(x*scale,y*scale);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.strokeStyle='#d0ccc5'; ctx.lineWidth=1.2*scale;
  for (const [cx2,cy2,r] of [[-18,0,16],[-4,-10,18],[12,-6,14],[26,2,12]]) {
    ctx.beginPath(); ctx.arc(cx2*s*scale,cy2*s*scale,r*s*scale,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

function drawTree(x, y) {
  ctx.save(); ctx.translate(x*scale,y*scale);
  ctx.strokeStyle='#b8a890'; ctx.lineWidth=2*scale;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-30*scale); ctx.stroke();
  ctx.fillStyle='rgba(180,210,160,0.5)'; ctx.strokeStyle='#9ab890'; ctx.lineWidth=1.5*scale;
  ctx.beginPath(); ctx.arc(0,-36*scale,14*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawGround() {
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5*scale;
  ctx.beginPath(); ctx.moveTo(0,GROUND*scale); ctx.lineTo(BW*scale,GROUND*scale); ctx.stroke();
  ctx.strokeStyle='#d8d0c4'; ctx.lineWidth=scale;
  for (let i=0;i<14;i++){
    const gx=((frame*getSpeed()*0.5)+i*38)%BW;
    ctx.beginPath(); ctx.moveTo(gx*scale,GROUND*scale);
    ctx.lineTo((gx+18)*scale,GROUND*scale); ctx.stroke();
  }
}

function checkCollision(item) {
  const ds = dogScale();
  const dx = item.x - DOG_X;
  const dy = item.y - 8 - dog.y;
  if (item.type==='flower') return Math.abs(dx)<20*ds && Math.abs(dy)<20*ds;
  if (item.type==='puddle') return Math.abs(dx)<18*ds && dog.y>=GROUND-4;
  return false;
}

function jump() {
  if (gameState==='idle'||gameState==='gameover') { start(); return; }
  if (dog.onGround && gameState==='playing') { dog.vy=JUMP_V; dog.onGround=false; }
}

function start() {
  gameState='playing'; score=0;
  dog={ y:GROUND, vy:0, onGround:true, legPhase:0 };
  items=[]; frame=0; animFrame=0; particles=[];
}

function drawScore() {
  const fs = isMobile ? 15 : 14;
  const fb = isMobile ? 22 : 22;
  ctx.font=`${fs*scale}px Georgia,serif`; ctx.fillStyle='#888'; ctx.textAlign='left';
  ctx.fillText('score', 18*scale, 28*scale);
  ctx.font=`bold ${fb*scale}px Georgia,serif`; ctx.fillStyle='#333';
  ctx.fillText(score, 18*scale, 52*scale);
  if (hiScore>0){
    ctx.font=`${(fs-2)*scale}px Georgia,serif`; ctx.fillStyle='#bbb'; ctx.textAlign='right';
    ctx.fillText('best  '+hiScore, (BW-18)*scale, 28*scale);
  }
}

function drawIdleScreen() {
  const cy = isMobile ? BH*0.18 : BH*0.32;
  ctx.font=`bold ${18*scale}px Georgia,serif`; ctx.fillStyle='#555'; ctx.textAlign='center';
  ctx.fillText('tap to start', BW/2*scale, cy*scale);
  ctx.font=`${12*scale}px Georgia,serif`; ctx.fillStyle='#bbb';
  ctx.fillText('flowers ✿  avoid puddles', BW/2*scale, (cy+22)*scale);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawGameOver() {
  const cx2=BW/2, cy2=isMobile?BH*0.18:BH*0.27;
  const bw=210, bh=76;
  ctx.fillStyle='rgba(255,255,255,0.9)';
  roundRect((cx2-bw/2)*scale,cy2*scale,bw*scale,bh*scale,12*scale); ctx.fill();
  ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1.5*scale;
  roundRect((cx2-bw/2)*scale,cy2*scale,bw*scale,bh*scale,12*scale); ctx.stroke();
  ctx.font=`bold ${15*scale}px Georgia,serif`; ctx.fillStyle='#444'; ctx.textAlign='center';
  ctx.fillText('splashed!  score '+score, cx2*scale,(cy2+28)*scale);
  ctx.font=`${12*scale}px Georgia,serif`; ctx.fillStyle='#aaa';
  ctx.fillText('tap to try again', cx2*scale,(cy2+52)*scale);
}

// ─────────────────────────────────────────────
// メインループ
// ─────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  animFrame++;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fdfbf7'; ctx.fillRect(0,0,canvas.width,canvas.height);

  for (const cl of clouds){
    cl.x -= gameState==='playing' ? 0.3 : 0.15;
    if (cl.x < -80) cl.x = BW+80;
    drawCloud(cl.x,cl.y,cl.s);
  }
  for (const t of bgTrees){
    t.x -= gameState==='playing' ? getSpeed()*0.4 : 0;
    if (t.x < -30) t.x = BW+30;
    drawTree(t.x,t.y);
  }
  drawGround();

  if (gameState==='playing'){
    frame++;
    dog.vy+=GRAVITY; dog.y+=dog.vy;
    if (dog.y>=GROUND){ dog.y=GROUND; dog.vy=0; dog.onGround=true; }
    dog.legPhase += dog.onGround ? 0.22 : 0;

    if (frame%90===0) spawnItem();

    for (let i=items.length-1;i>=0;i--){
      const it=items[i]; it.x-=getSpeed();
      if (it.type==='flower'&&!it.collected){
        drawFlower(it.x,it.y,animFrame);
        if (checkCollision(it)){
          it.collected=true; score++;
          spawnParticles(DOG_X*scale,dog.y*scale,'#ffcc88');
          items.splice(i,1);
        }
      } else if (it.type==='puddle'){
        drawPuddle(it.x,it.y);
        if (checkCollision(it)){
          spawnParticles(DOG_X*scale,dog.y*scale,'#78b4f0');
          if (score>hiScore) hiScore=score;
          gameState='gameover';
        }
      }
      if (it.x<-60) items.splice(i,1);
    }
    drawDog(DOG_X,dog.y,dog.legPhase,!dog.onGround);
    drawScore();

  } else if (gameState==='idle'){
    initObjects();
    const bob=Math.sin(animFrame*0.04)*2;
    drawDog(DOG_X,GROUND+bob,animFrame*0.15,false);
    drawIdleScreen();
    const gap = isMobile ? 55 : 80;
    for (let i=0;i<3;i++) drawFlower(DOG_X+50+i*gap,GROUND-8,animFrame+i*30);

  } else if (gameState==='gameover'){
    drawPuddle(DOG_X+10,GROUND+8);
    drawDog(DOG_X,GROUND,0,false);
    drawScore(); drawGameOver();
  }

  for (let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*scale; p.y+=p.vy*scale; p.vy+=0.15*scale; p.life-=0.04;
    if (p.life<=0){ particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=scale;
    ctx.beginPath(); ctx.arc(p.x,p.y,3*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); jump(); });
document.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); jump(); } });

loop();
</script>
</body>
</html>
